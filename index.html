<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrowdCourt - Sportplätze in Innsbruck</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="topbar">
        <div class="brand">
          <img src="./logo-crowdcourt.svg" alt="CrowdCourt Logo" class="brand-logo" />
          <div>
            <h1>Choose a location</h1>
            <p>See what's available around Innsbruck</p>
          </div>
        </div>
        <button class="close-btn" type="button" aria-label="Schließen">✕</button>
      </header>

      <section class="controls">
        <button class="filter-btn" data-sport="soccer">⚽ Fußball</button>
        <button class="filter-btn" data-sport="tennis">🎾 Tennis</button>
        <button class="filter-btn" data-sport="volleyball">🏐 Volleyball</button>
        <button class="filter-btn" data-sport="table_tennis">🏓 Tischtennis</button>
        <button id="clear-filters-btn" class="secondary" type="button">Filter zurücksetzen</button>
        <button id="locate-btn" class="secondary">Standort nutzen</button>
        <button id="reload-btn" class="secondary">Neu laden</button>
        <button id="fresh-load-btn" class="secondary">Frisch laden</button>
      </section>

      <section class="search-row">
        <input
          id="search-input"
          type="search"
          placeholder="Search for a court or sport"
          aria-label="Sportplätze durchsuchen"
        />
      </section>

      <section class="status-row" aria-live="polite">
        <span id="status">Lade Daten...</span>
        <span id="last-updated"></span>
        <span id="route-info"></span>
        <button id="retry-btn" class="tiny-btn" type="button" hidden>Erneut versuchen</button>
      </section>

      <section id="view-guidance" class="guidance-row"></section>

      <section id="onboarding-banner" class="onboarding-banner" hidden>
        <span>Neu hier? 1) Sport wählen 2) Spot auswählen 3) Route starten</span>
        <button id="dismiss-onboarding-btn" class="tiny-btn" type="button">Verstanden</button>
      </section>

      <section id="selected-spot-card" class="selected-spot-card" hidden>
        <div class="selected-head">
          <strong id="selected-name">Kein Spot ausgewählt</strong>
          <span id="selected-distance"></span>
        </div>
        <p id="selected-sports"></p>
        <div class="selected-actions">
          <button id="selected-route-btn" class="tiny-btn primary-tiny-btn" type="button">
            Route starten
          </button>
          <button id="selected-checkin-btn" class="tiny-btn" type="button">Ich bin hier</button>
          <button id="selected-checkout-btn" class="tiny-btn" type="button">Ich bin weg</button>
        </div>
      </section>

      <section class="content">
        <div id="map" aria-label="Karte mit Sportplätzen"></div>
        <aside class="list-panel">
          <div class="panel-head">
            <h2 id="panel-title">Spots in deiner Nähe</h2>
            <button id="clear-history-btn" class="tiny-btn" type="button">Verlauf löschen</button>
          </div>
          <div id="recents-strip" class="recents-strip" hidden></div>
          <ul id="spots-list"></ul>
        </aside>
      </section>

      <nav class="bottom-nav" aria-label="Ansichten">
        <button class="nav-btn active" data-view="map">🗺️ Map</button>
        <button class="nav-btn" data-view="favorites">💙 Favoriten</button>
        <button class="nav-btn" data-view="history">🕘 Verlauf</button>
      </nav>

      <button id="choose-location-btn" class="choose-location-btn" type="button">
        Route starten
      </button>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
